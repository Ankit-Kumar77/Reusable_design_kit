apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground-adk-deployment
  labels:
    app: playground-adk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: playground-adk
  template:
    metadata:
      labels:
        app: playground-adk
    spec:
      containers:
      - name: flutter-app
        # Use the image name we defined in Docker/Jenkins
        # For local testing, ensure the image is built or available to the cluster
        image: playground-adk:latest
        imagePullPolicy: Never # Forces K8s to use local image (good for Minikube)
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: playground-adk-service
spec:
  selector:
    app: playground-adk
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
